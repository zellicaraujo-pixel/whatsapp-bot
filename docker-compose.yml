version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution123
      POSTGRES_DB: evolution
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      # Servidor
      SERVER_URL: http://localhost:8080
      SERVER_PORT: 8080
      TZ: America/Sao_Paulo

      # Autenticacao
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: sua_senha_secreta_global

      # CORS
      CORS_ORIGIN: "*"
      CORS_METHODS: "POST,GET,PUT,DELETE"

      # Banco de Dados
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution123@postgres:5432/evolution

      # Logs
      LOG_LEVEL: "ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,WEBHOOKS"
      LOG_COLOR: "true"

      # Armazenamento
      DEL_INSTANCE: "false"
      STORE_MESSAGES: "true"
      STORE_MESSAGE_UP: "true"
      STORE_CONTACTS: "true"
      STORE_CHATS: "true"

      # Cache
      CACHE_REDIS_ENABLED: "false"
      CACHE_LOCAL_ENABLED: "false"

      # QR Code
      QRCODE_LIMIT: 30
      CONFIG_SESSION_PHONE_CLIENT: EvolutionAPI
      CONFIG_SESSION_PHONE_NAME: Chrome

volumes:
  postgres_data:
